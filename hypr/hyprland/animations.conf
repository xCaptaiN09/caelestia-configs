# xCaptaiN09

animations {
    enabled = true

    # --- PHYSICS ---
    # The Bounce for opening
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    # Smooth curve for closing
    bezier = smooth, 0.25, 1, 0.5, 1

    # --- WINDOW ACTIONS ---

    # Opening: Slides UP from bottom + Bounces
    animation = windowsIn, 1, 6, overshot, slide bottom

    # Closing: Slides DOWN to bottom.
    # We removed 'slidefadevert' because it broke the direction.
    # We use 'slide bottom' so it 100% drops down.
    animation = windowsOut, 1, 5, smooth, slide bottom

    # Moving
    animation = windowsMove, 1, 4, default

    # --- FADING (The Ghosting Effect) ---
    # This is the key. We sync 'fade' to the same speed (5) as 'windowsOut'.
    # This means as the window drops, it turns into a ghost (fades out).
    animation = fade, 1, 5, smooth
    animation = fadeOut, 1, 5, smooth

    animation = workspaces, 1, 6, overshot, slide
    animation = layers, 1, 4, overshot, slide
}
